---
layout: default
---

<div class="hero">
  <h1>My Knowledge System</h1>
  <p>
    A personal digital knowledge base where I organize and refine
    what I learn.
  </p>

  <div class="topic-grid">
    {% for topic in site.topics %}
      <a href="{{ topic.url }}" class="topic-card">
        <i data-lucide="{{ topic.icon }}"></i>
        <h3>{{ topic.title }}</h3>
        <p>{{ topic.description }}</p>
      </a>
    {% endfor %}
  </div>
</div>

<script>
  lucide.createIcons();
</script>
